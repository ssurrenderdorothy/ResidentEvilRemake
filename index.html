<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>An envelope for Alena</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Добавляем стили для сообщений-подсказок */
    .hint-message {
      position: fixed;
      font-size: 28px;
      font-weight: bold;
      color: #ff3366;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      z-index: 1000;
      pointer-events: none;
      animation: floatUp 1.5s ease-out forwards;
      font-family: 'Great Vibes', cursive;
    }

    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-150px) scale(1.5);
      }
    }

    .envelope-wrapper {
      position: fixed;
      cursor: pointer;
      transition: all 0.5s ease;
      z-index: 10;
    }

    /* Центрируем конверт изначально */
    .envelope-wrapper {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .envelope-wrapper.centered {
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) !important;
    }
  </style>
</head>
<body>
  <div class="envelope-wrapper" id="envelopeWrapper">
    <div class="envelope" id="envelope" onclick="handleEnvelopeClick(event)">
      <div class="flap"></div>
      <div class="left-flap"></div>
      <div class="right-flap"></div>
      <div class="body"></div>
    </div>
  </div>

  <div class="message" id="message">Алена Вечор-Симпатишная такая и смешная оч такая прям вся бебебебебеббебебебебебебе</div>

  <audio id="princeMusic" src="temny_prinz.mp3" loop preload="auto"></audio>

  <script>
    let musicStarted = false;
    let clickCount = 0;
    const wrapper = document.getElementById('envelopeWrapper');
    const envelope = document.getElementById('envelope');

    function startMusic() {
      if (musicStarted) return;
      const music = document.getElementById('princeMusic');
      
      music.play().then(() => {
        musicStarted = true;
        console.log('🎵 Музыка играет!');
      }).catch((error) => {
        console.log('⚠️ Ошибка:', error.name);
      });
    }

    // Функция для показа всплывающей надписи
    function showHint(text, x, y) {
      const hint = document.createElement('div');
      hint.className = 'hint-message';
      hint.textContent = text;
      hint.style.left = x + 'px';
      hint.style.top = y + 'px';
      document.body.appendChild(hint);
      
      setTimeout(() => {
        hint.remove();
      }, 1500);
    }

    // Обработчик клика по конверту
    window.handleEnvelopeClick = function(event) {
      event.stopPropagation(); // Останавливаем всплытие, чтобы не сработал window.click
      clickCount++;
      
      if (clickCount === 1) {
        startMusic();
        
        const maxX = window.innerWidth - 200;
        const maxY = window.innerHeight - 200;
        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;
        
        wrapper.style.left = randomX + 'px';
        wrapper.style.top = randomY + 'px';
        wrapper.style.transform = 'translate(0, 0)';
        wrapper.classList.remove('centered');
        
        showHint('не сюда', event.clientX - 50, event.clientY - 30);
        
      } else if (clickCount === 2) {
        const maxX = window.innerWidth - 200;
        const maxY = window.innerHeight - 200;
        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;
        
        wrapper.style.left = randomX + 'px';
        wrapper.style.top = randomY + 'px';
        wrapper.style.transform = 'translate(0, 0)';
        wrapper.classList.remove('centered');
        
        showHint('ЧЕ НЕ ТАК-ТО', event.clientX - 60, event.clientY - 30);
        
      } else if (clickCount === 3) {
        wrapper.classList.add('centered');
        wrapper.style.left = '50%';
        wrapper.style.top = '50%';
        wrapper.style.transform = 'translate(-50%, -50%)';
        
        document.getElementById("envelope").classList.add("open");
        
        setTimeout(() => {
          document.getElementById("message").classList.add("show");
        }, 1500);
      }
    };

    // Запасной вариант: клик в любом месте включает музыку
    window.addEventListener('click', startMusic);

    // Сердечки
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.style.left = Math.random() * 100 + "vw";
      heart.innerHTML = '<svg viewBox="0 0 24 24" fill="red" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 6.42 3.42 5 5.5 5c1.54 0 2.99 1.04 3.5 2.44C9.51 6.04 10.96 5 12.5 5 14.58 5 16 6.42 16 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 20000);
    }

    setInterval(createHeart, 800);
  </script>
</body>
</html>
