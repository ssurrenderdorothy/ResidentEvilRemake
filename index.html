<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>An envelope for Alena</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Стили для сообщений-подсказок */
    .hint-message {
      position: fixed;
      font-size: 28px;
      font-weight: bold;
      color: black;
      text-shadow: none;
      z-index: 15;
      pointer-events: none;
      font-family: 'Great Vibes', cursive;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    .hint-message.hidden {
      opacity: 0;
    }

    .envelope-wrapper {
      position: fixed;
      cursor: pointer;
      transition: all 0.5s ease;
      z-index: 10;
    }

    /* Центрируем конверт изначально */
    .envelope-wrapper {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .envelope-wrapper.centered {
      top: 30% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) !important;
    }
  </style>
</head>
<body>
  <div class="envelope-wrapper" id="envelopeWrapper">
    <div class="envelope" id="envelope" onclick="handleEnvelopeClick(event)">
      <div class="flap"></div>
      <div class="left-flap"></div>
      <div class="right-flap"></div>
      <div class="body"></div>
    </div>
  </div>

  <div class="message" id="message">Алена Вечор-Симпатишная такая и смешная оч такая прям вся бебебебебеббебебебебебебе</div>

  <audio id="princeMusic" src="temny_prinz.mp3" loop preload="auto"></audio>

  <script>
    let musicStarted = false;
    let clickCount = 0;
    let hint1 = null;
    let hint2 = null;
    const wrapper = document.getElementById('envelopeWrapper');
    const envelope = document.getElementById('envelope');

    function startMusic() {
      if (musicStarted) return;
      const music = document.getElementById('princeMusic');
      
      music.play().then(() => {
        musicStarted = true;
        console.log('🎵 Музыка играет!');
      }).catch((error) => {
        console.log('⚠️ Ошибка:', error.name);
      });
    }

    // Функция для создания надписи
    function createHint(text, x, y) {
      const hint = document.createElement('div');
      hint.className = 'hint-message';
      hint.textContent = text;
      hint.style.left = x + 'px';
      hint.style.top = (y - 80) + 'px'; // Поднимаем надпись выше, чтобы была над конвертом
      document.body.appendChild(hint);
      return hint;
    }

    // Обработчик клика по конверту
    window.handleEnvelopeClick = function(event) {
      event.stopPropagation();
      clickCount++;
      
      if (clickCount === 1) {
        startMusic();
        
        const maxX = window.innerWidth - 200;
        const maxY = window.innerHeight - 200;
        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;
        
        wrapper.style.left = randomX + 'px';
        wrapper.style.top = randomY + 'px';
        wrapper.style.transform = 'translate(0, 0)';
        wrapper.classList.remove('centered');
        
        // Если была вторая надпись - удаляем её
        if (hint2) {
          hint2.remove();
          hint2 = null;
        }
        
        // Создаем первую надпись, если её нет
        if (!hint1) {
          hint1 = createHint('не сюда', event.clientX, event.clientY);
        }
        
      } else if (clickCount === 2) {
        const maxX = window.innerWidth - 200;
        const maxY = window.innerHeight - 200;
        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;
        
        wrapper.style.left = randomX + 'px';
        wrapper.style.top = randomY + 'px';
        wrapper.style.transform = 'translate(0, 0)';
        wrapper.classList.remove('centered');
        
        // Удаляем первую надпись
        if (hint1) {
          hint1.remove();
          hint1 = null;
        }
        
        // Создаем вторую надпись, если её нет
        if (!hint2) {
          hint2 = createHint('ЧЕ НЕ ТАК-ТО', event.clientX, event.clientY);
        }
        
      } else if (clickCount === 3) {
        // Удаляем все надписи
        if (hint1) {
          hint1.remove();
          hint1 = null;
        }
        if (hint2) {
          hint2.remove();
          hint2 = null;
        }
        
        wrapper.classList.add('centered');
        wrapper.style.left = '50%';
        wrapper.style.top = '30%';
        wrapper.style.transform = 'translate(-50%, -50%)';
        
        document.getElementById("envelope").classList.add("open");
        
        setTimeout(() => {
          document.getElementById("message").classList.add("show");
        }, 1500);
      }
    };

    // Запасной вариант: клик в любом месте включает музыку
    window.addEventListener('click', startMusic);

    // Сердечки
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.style.left = Math.random() * 100 + "vw";
      heart.innerHTML = '<svg viewBox="0 0 24 24" fill="red" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 6.42 3.42 5 5.5 5c1.54 0 2.99 1.04 3.5 2.44C9.51 6.04 10.96 5 12.5 5 14.58 5 16 6.42 16 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 20000);
    }

    setInterval(createHeart, 800);
  </script>
</body>
</html>
